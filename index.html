<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JW Player Demo</title>

<script src="https://cdn.jwplayer.com/libraries/SAHhwvZq.js"></script>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#player{
    width:100%;
    height:100%;
}

#loading{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    color:#fff;
    z-index:100;
    font-size:18px;
}

#title{
    position:absolute;
    top:15px;
    left:15px;
    padding:8px 14px;
    background:rgba(0,0,0,.6);
    color:#fff;
    border-radius:6px;
    z-index:20;
}

#buttons{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    gap:8px;
    z-index:20;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:6px;
    background:#d32f2f;
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>

</head>
<body>

<div id="loading">Loading...</div>

<div id="title">Loading Channel...</div>

<div id="buttons">
<button id="reloadBtn">Reload</button>
<button id="fsBtn">Fullscreen</button>
</div>

<div id="player"></div>

<script>

const CHANNELS_JSON_URL="channels.json"; // Replace with your JSON URL

async function loadChannel(){

    document.getElementById("loading").style.display="flex";

    try{

        const res=await fetch(https://wispy-wave-3131.diwij76343.workers.dev/);
        const channels=await res.json();

        const params=new URLSearchParams(location.search);
        const id=params.get("id") || channels[0].id;

        const channel=channels.find(c=>String(c.id)===String(id));

        if(!channel){

            document.getElementById("loading").innerHTML="Channel Not Found";
            return;

        }

        document.title=channel.name;

        document.getElementById("title").innerHTML=channel.name;

        jwplayer("player").setup({

            file:channel.url,

            width:"100%",

            height:"100%",

            autostart:true,

            mute:false,

            stretching:"uniform"

        });

        jwplayer().on("ready",()=>{

            document.getElementById("loading").style.display="none";

        });

        jwplayer().on("play",()=>{

            document.getElementById("loading").style.display="none";

        });

        jwplayer().on("error",(e)=>{

            console.log(e);

            document.getElementById("loading").style.display="flex";
            document.getElementById("loading").innerHTML="Playback Error... Retrying";

            setTimeout(()=>{

                jwplayer().load([{file:channel.url}]);
                jwplayer().play();

            },3000);

        });

    }
    catch(e){

        console.log(e);

        document.getElementById("loading").innerHTML="Unable to load channel list";

    }

}

document.getElementById("reloadBtn").onclick=()=>{

    location.reload();

};

document.getElementById("fsBtn").onclick=()=>{

    jwplayer().setFullscreen(true);

};

loadChannel();

</script>

</body>
</html>
