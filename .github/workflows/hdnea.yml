name: Fetch HDNEA Token Auto Update

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-token:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch Token
        env:
          COOKIE_JSON_URL: ${{ secrets.HDNEA_JSON_URL }}
        run: |
          echo "::add-mask::$COOKIE_JSON_URL"

          if [ -z "$COOKIE_JSON_URL" ]; then
            echo "❌ Secret not set"
            exit 1
          fi

          response=$(curl -fsSL "$COOKIE_JSON_URL")

          echo "$response" > response.json

          # ✅ FIXED LINE (your issue solved here)
          token=$(jq -r '.Cookie' response.json)

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "❌ Token fetch failed"
            cat response.json
            exit 1
          fi

          echo "::add-mask::$token"

          echo "$token" > fetch.txt

      - name: Update M3U
        run: python update_m3u.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add fetch.txt channels.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "🔄 Auto update token"
          git push
