name: Fetch HDNEA Token from M3U

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-token:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep sed

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Download M3U
        env:
          M3U_URL: ${{ secrets.M3U_URL }}
        run: |
          echo "Downloading M3U..."
          curl -L --fail "$M3U_URL" -o source.m3u

          if [ ! -s source.m3u ]; then
            echo "Download failed"
            exit 1
          fi

      - name: Extract Token
        run: |
          token=$(grep -oE '__hdnea__=[^&"]+' source.m3u | head -n 1)

          if [ -z "$token" ]; then
            echo "Token not found"
            exit 1
          fi

          echo "$token" > fetch.txt
          echo "Token: $token"

      - name: Update M3U
        run: python append_hdnea_m3u.py

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add channels.m3u fetch.txt

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update token"
          git pull --rebase
          git push
