name: Full IPTV Auto Update

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-all:
    runs-on: ubuntu-latest

    steps:

      # STEP 1: Checkout Repo
      - name: Checkout
        uses: actions/checkout@v4

      # STEP 2: Install Tools
      - name: Install curl & jq
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq

      # STEP 3: Fetch Raw Data (SAVE TO fetch.txt)
      - name: Fetch Data
        run: |
          curl -s "https://voot.vodep39240327.workers.dev?voot.m3u" > fetch.txt

      # STEP 4: Extract Token / Cookie (SAVE TO cookie.txt)
      - name: Extract Cookie
        run: |
          TOKEN=$(grep -o 'hdnea=[^"]*' fetch.txt | head -n1)

          # fallback if not found
          if [ -z "$TOKEN" ]; then
            TOKEN=$(grep -o 'hdnea=[^&]*' fetch.txt | head -n1)
          fi

          echo "$TOKEN" > cookie.txt

      # STEP 5: Generate channels.m3u
      - name: Create Channels M3U
        run: |
          TOKEN=$(cat cookie.txt)

          cat <<EOF > channels.m3u
#EXTM3U

#EXTINF:-1 tvg-name="Voot Live",Voot Live
#EXTVLCOPT:http-user-agent=Mozilla/5.0
#EXTVLCOPT:http-referrer=https://voot.com/
#EXTVLCOPT:http-origin=https://voot.com
#EXTVLCOPT:http-cookie=$TOKEN

https://voot.vodep39240327.workers.dev/stream.m3u8?$TOKEN
EOF

      # STEP 6: Commit All Files
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add fetch.txt cookie.txt channels.m3u

          git commit -m "Auto update all files $(date)" || echo "No changes"

          git push
