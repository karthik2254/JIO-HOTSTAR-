name: Auto Update M3U Cookie Bot

on:
  schedule:
    - cron: '*/10 * * * *'   # ⏱ every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4

      - name: 🔑 Fetch Cookie
        id: cookie
        run: |
          COOKIE=$(curl -sI "https://voot.vodep39240327.workers.dev" \
          | grep -i set-cookie \
          | head -1 \
          | sed -E 's/.*(hdnea=[^;]+).*/\1/')

          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT
          echo "Fetched Cookie: $COOKIE"

      - name: 🔄 Update channels.m3u
        run: |
          COOKIE="${{ steps.cookie.outputs.cookie }}"

          # Escape special chars
          SAFE_COOKIE=$(printf '%s\n' "$COOKIE" | sed 's/[\/&]/\\&/g')

          sed -i -E "s/hdnea=[^&\"]*/$SAFE_COOKIE/g" channels.m3u

      - name: 💾 Commit & Push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add channels.m3u
          git commit -m "🔄 Auto cookie update" || echo "No changes"
          git push
