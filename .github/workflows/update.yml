name: Update Cookie in channels.m3u

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔑 Get new cookie
      - name: Get Cookie
        id: getcookie
        run: |
          COOKIE=$(curl -sI "https://voot.vodep39240327.workers.dev" \
          | grep -i set-cookie \
          | head -1 \
          | sed -E 's/.*(hdnea=[^;]+).*/\1/')

          echo "COOKIE=$COOKIE"
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT

      # 🔄 Update inside M3U (SAFE REPLACEMENT)
      - name: Update channels.m3u
        run: |
          COOKIE="${{ steps.getcookie.outputs.cookie }}"

          # Escape special characters for sed
          SAFE_COOKIE=$(printf '%s\n' "$COOKIE" | sed 's/[\/&]/\\&/g')

          sed -i -E "s/hdnea=[^&\"]*/$SAFE_COOKIE/g" channels.m3u

      # 💾 Commit changes
      - name: Commit & Push
        run: |
          git config --global user.name "m3u-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add channels.m3u
          git commit -m "🔄 Auto cookie update" || echo "No changes"
          git push
