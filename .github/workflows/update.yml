name: Auto Update Voot M3U

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Fetch M3U
        run: |
          curl -L "https://voot.vodep39240327.workers.dev?voot.m3u" -o voot.m3u

      - name: Check Changes
        id: diff
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add voot.m3u
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git commit -m "Auto update voot.m3u"
          git push
