name: Update Cookie Only

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔑 STEP 1: GET NEW COOKIE
      - name: Fetch Cookie
        id: cookie
        run: |
          COOKIE=$(curl -I -s "https://voot.vodep39240327.workers.dev" | grep -i 'set-cookie' | head -n 1 | cut -d ';' -f1 | cut -d ' ' -f2)
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT

      # 📝 STEP 2: REPLACE COOKIE IN M3U
      - name: Update Cookie in voot.m3u
        run: |
          sed -i "s/Cookie:.*/Cookie: ${{ steps.cookie.outputs.cookie }}/g" voot.m3u

      # 🔍 STEP 3: CHECK CHANGES
      - name: Check Changes
        id: diff
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add voot.m3u
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      # 🚀 STEP 4: COMMIT
      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git commit -m "Updated Cookie"
          git push
