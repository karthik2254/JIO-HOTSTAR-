name: Fetch HDNEA Token from M3U

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-token:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl grep

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Fetch M3U File
        env:
          M3U_URL: ${{ secrets.M3U_URL }}
        run: |
          echo "Downloading M3U..."
          curl -L "$M3U_URL" -o source.m3u

      - name: Extract HDNEA Token
        run: |
          echo "Extracting token..."

          token=$(grep -o '__hdnea__=[^&"]*' source.m3u | head -n 1)

          if [ -z "$token" ]; then
            echo "ERROR: Token not found"
            exit 1
          fi

          echo "$token" > fetch.txt
          echo "Token: $token"

      - name: Update Channels M3U
        run: |
          python append_hdnea_m3u.py

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add fetch.txt channels.m3u

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto update HDNEA token"
          git push
