name: Auto Update HDNEA Token in M3U

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Fetch HDNEA Token
        env:
          COOKIE_JSON_URL: ${{ secrets.HDNEA_JSON_URL }}
        run: |

          echo "Fetching token..."

          response=$(curl -s "$COOKIE_JSON_URL")

          token=$(echo "$response" | jq -r '.[0].cookie' | sed 's/^__hdnea__=//')

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "❌ Token fetch failed"
            exit 1
          fi

          echo "$token" > token.txt
          echo "✅ Token fetched"

      - name: Update M3U File
        run: |

          echo "Updating M3U..."

          TOKEN=$(cat token.txt)

          # Replace or append token in all stream URLs
          sed -i "s|__hdnea__=[^&]*|__hdnea__=$TOKEN|g" channels.m3u

          echo "✅ M3U updated"

      - name: Commit & Push
        run: |

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add channels.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "🔄 Auto update HDNEA token"
          git push
