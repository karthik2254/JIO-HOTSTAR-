name: Update Cookie in M3U

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Step 1: Get New Cookie / Token
      - name: Fetch New Cookie
        id: cookie
        run: |
          # Example: extract cookie from API or headers
          COOKIE=$(curl -sI "https://voot.vodep39240327.workers.dev" | grep -i set-cookie | head -1 | cut -d';' -f1 | cut -d' ' -f2)
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT

      # Step 2: Replace Old Cookie in M3U
      - name: Update Cookie in M3U
        run: |
          # Replace old cookie/token parameter in all URLs
          sed -i "s/hdnea=[^&]*/hdnea=${{ steps.cookie.outputs.cookie }}/g" channels.m3u

      # Step 3: Commit & Push
      - name: Commit & Push
        run: |
          git config --global user.name "cookie-bot"
          git config --global user.email "bot@users.noreply.github.com"
          
          git add channels.m3u
          git commit -m "Updated cookie/token" || echo "No changes"
          git push
