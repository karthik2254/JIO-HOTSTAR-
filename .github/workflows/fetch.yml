name: Update Cookie in channels.m3u

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔑 Step 1: Get New Cookie (Replace this logic if needed)
      - name: Get Cookie
        id: getcookie
        run: |
          COOKIE=$(curl -sI "https://voot.vodep39240327.workers.dev" \
          | grep -i set-cookie \
          | head -1 \
          | sed -E 's/.*(hdnea=[^;]+).*/\1/')
          
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT

      # 🔄 Step 2: Replace Cookie inside channels.m3u
      - name: Update channels.m3u
        run: |
          sed -i -E "s/hdnea=[^&\"]*/${{ steps.getcookie.outputs.cookie }}/g" channels.m3u

      # 💾 Step 3: Commit Changes
      - name: Commit & Push
        run: |
          git config --global user.name "m3u-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add channels.m3u
          git commit -m "Updated cookie in channels.m3u" || echo "No changes"
          git push
