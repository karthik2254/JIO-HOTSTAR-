name: Fetch Cookie Only

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-cookie:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 🔑 STEP 1: FETCH COOKIE
      - name: Get Cookie
        id: cookie
        run: |
          COOKIE=$(curl -I -s "https://voot.vodep39240327.workers.dev" \
          -H "User-Agent: Mozilla/5.0" \
          | grep -i 'set-cookie' \
          | head -n 1 \
          | cut -d ';' -f1 \
          | cut -d ' ' -f2)

          echo "$COOKIE" > cookie.txt
          echo "cookie=$COOKIE" >> $GITHUB_OUTPUT

      # 🔍 STEP 2: CHECK CHANGES
      - name: Check Changes
        id: diff
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add cookie.txt
          git diff --cached --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      # 🚀 STEP 3: COMMIT
      - name: Commit & Push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git commit -m "Updated Cookie"
          git push
